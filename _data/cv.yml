        responsibilities:
            - Assist in designing and conducting academic research projects, including literature reviews, data collection, and data analysis.
            - Support the preparation of research proposals, manuscripts, reports, and conference presentations under the professor’s guidance.
            - Manage and clean datasets, run statistical/econometric analyses, and prepare visualizations or tables for publication.
            - Provide editorial support in drafting and reviewing academic papers, grant applications, and project documents.
            - Coordinate with other research team members, graduate students, and administrative staff to ensure smooth project implementation.
            - Assist in organizing academic seminars, workshops, and conferences hosted by the supervising professor.
            - Perform administrative and logistical tasks related to research projects as assigned.
            - Assist the professor in preparing and delivering course materials, including lecture slides, handouts, and supplementary resources.
            - Conduct tutorials, discussion sessions, and lab work to reinforce course concepts for students.
            - Assist the professor in preparing and delivering course materials, including lecture slides, handouts, and supplementary resources.
