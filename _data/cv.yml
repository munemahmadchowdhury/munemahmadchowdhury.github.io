        highlights:
          - Designed survey instruments and developed sampling strategies to meet quarterly research targets across a global respondent pool.
          - Coordinated end-to-end administration of surveys reaching 34,000+ recipients (3,000 via email; 31,000 via Slack) and performed quantitative analysis including data cleaning and summary statistics in Google Sheets.

      - company: Analytics for a Better World
