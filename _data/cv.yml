    Experience:
      - company: Bangladesh Institute of Social Research Trust
        position: Research Fellow, Economic Division
        location: Dhaka, Bangladesh
        start_date: 2025-01
        end_date: "present"
        highlights:
          - Served as Study Manager and Co-Researcher for mixed-methods impact evaluations of a national skill development initiative (n = 7,000 trainees) and a climate-resilient livelihood programme (n = 400 women entrepreneurs), contributing to study design, sampling, field coordination, and analysis.
          - Led two major research projects as Co-Researcher; a climate-induced migration study commissioned by BRAC and a gender analysis of the plastic waste value chain for UNDP Bangladesh, overseeing instrument design, field supervision, data analysis, and final reporting.
          - Secured competitive consultancies from UNDP Bangladesh, including USD 120,000 for an e-Parliament Feasibility Study and USD 19,850 for a gender analysis of the waste value chain in Chattogram, Cox's Bazar, and Tangail.
          - Supervised and mentored a team of 3 interns, 2 research assistants, and 2 research associates.
          - Served as organizing manager of a national conference, overseeing the entire process from communications to program design.

      - company: AI Unveils Tomorrow Project, Regional UNDP Office, Bangkok
        position: Research Associate to Dr. Selim Jahan, Senior Advisor
        location: Dhaka, Bangladesh
        start_date: 2025-12
        end_date: 2026-06
        highlights:
          - Produced comprehensive political-economic country analyses tracing historical development trajectories from independence to present across six countries; Thailand, Indonesia, Viet Nam, Mongolia, Sri Lanka, and Fiji.
          - Assessed current economic, societal, environmental, and geopolitical risks for each country, synthesizing multi-source literature into structured country briefs for a UNDP regional flagship report.
          - Documented national development frameworks including objectives, strategic priorities, reported achievements, and implementation challenges to support comparative analysis across Asia-Pacific.

      - company: Bangladesh Institute of Social Research Trust
        position: Research Associate, Economic Division
        location: Dhaka, Bangladesh
        start_date: 2023-06
        end_date: 2024-12
        highlights:
          - Executed three research projects for TdH Netherlands, Chattogram City Corporation, and Ministry of Planning of GoB, contributing to methodology development, data collection, analysis, and reporting.
          - Facilitated an eight-day training for 42 enumerators and supervised month-long data collection for the End-line Evaluation of BRAC's Gender Responsive Education and Skill Programme in Chattogram Hill Tracts.
          - Authored two peer-reviewed journal articles and five op-eds in national newspapers.
          - Reviewed 16 research articles and organized two national-level conferences.
          - Secured a USD 20,000 research grant from Bangladesh Police for a study on public traffic awareness.

      - company: Change Initiative
        position: Research Assistant
        location: Dhaka, Bangladesh
        start_date: 2022-05
        end_date: 2023-06
        highlights:
          - Completed five research and consultancy projects for WIN, European Climate Foundation, ALRD, TI Maldives, and Oxfam, assisting PI in survey design, data cleaning and analysis, policy analysis, and report writing.
          - Developed ODK forms for household data collection and managed databases for multiple projects.
          - Organized the Dhaka Renewable Energy and Finance Talk (DREFT) with participation from over 300 stakeholders.
          - Secured a USD 15,000 consultancy from OXFAM Bangladesh for a comprehensive study on climate risk insurance.

      - company: Department of Economics, Comilla University
        position: Graduate Research Assistant
        location: Cumilla, Bangladesh
        start_date: 2020-06
        end_date: 2022-04
        highlights:
          - "Supervising Professor: Dr. Kazi Mohammed Kamal Uddin"
          - Contributed to a research project on economic growth and external financial means of implementation, assisting in literature review, methodology development, data analysis, and report writing.
          - Published three research articles in peer-reviewed journals.
          - Developed course materials and instructed STATA and R training sessions over two semesters.
          - Mentored two graduate students in econometrics, data analysis, and academic writing.

    Volunteer:
