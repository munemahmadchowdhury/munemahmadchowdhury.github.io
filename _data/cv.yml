    Experience:
      - company: Bangladesh Institute of Social Research Trust
        position: Research Fellow
        location: Dhaka, Bangladesh
        start_date: 2025
        end_date: "present"
        responsibilities: 
            - Lead the preparation of research proposals, concept notes, research reports, and high-quality publications, ensuring academic rigor and policy relevance.
            - Deliver presentations at national and international seminars, workshops, and conferences, representing the institution’s research excellence.
            - Provide strategic oversight, monitoring, and supervision of ongoing research projects to ensure timely delivery, budget compliance, and methodological soundness.
            - Publish original research in peer-reviewed journals of international repute and provide constructive peer review and commentary on colleagues’ work.
            - Establish and strengthen collaborations with national, regional, and international research and development organizations. Mentor and guide Research Associates, Research Officers, and Research Interns, fostering professional growth and building institutional research capacity.
            - Prepare policy briefs, op-eds, and analytical pieces for national and international platforms to inform decision-makers and the wider public.
            - Identify, pursue, and secure research and consultancy opportunities, including liaising with prospective donors, partners, and clients.
            - Contribute to the design and delivery of capacity-building workshops, training programs, and academic seminars. Provide intellectual leadership in defining new research agendas aligned with institutional priorities and emerging global challenges.
            - Perform other professional tasks and responsibilities as assigned by the institution’s leadership
        
        contributions:
          - Served as Study Manager and Co-Researcher for mixed-methods impact evaluations of a national skill development initiative (n = 7,000 trainees) and a climate-resilient livelihood programme (n = 400 women entrepreneurs), contributing to study design, sampling, field coordination, and analysis.
          - Led two major research projects as Co-Researcher; a climate-induced migration study commissioned by BRAC and a gender analysis of the plastic waste value chain for UNDP Bangladesh, overseeing instrument design, field supervision, data analysis, and final reporting.
          - Secured competitive consultancies from UNDP Bangladesh, including $120,000 for an e-Parliament Feasibility Study and $19,850 for a gender analysis of the waste value chain in Chattogram, Cox’s Bazar, and Tangail, through competitive proposal development.
          - Supervised and mentored a team of 3 interns, 2 research assistants, and 2 research associates, guiding them through proposal development, research design, and project implementation.
          - Served as the organizing manager of a national conference by overseeing the entire process—from handling communications to designing the full program.

      - company: Bangladesh Institute of Social Research Trust
        position: Research Associate
        location: Dhaka, Bangladesh
        start_date: 2023
        end_date: 2024
        responsibilities:
            - Preparing research proposals, concept papers, research reports, other reports, seminars, and workshop presentations.
            - Attending national and international seminars, workshops, etc., and giving presentations.
            - Monitoring and supervising on-going research works to ensure completion within time, budget and right quality.
            - Preparing articles for world-class journals and giving comments on articles of other researchers.
            - Coordinating with the national and international research and development organizations.
            - Preparing op-ed for national newspapers.
            - Search for call for research and other research/consultancy opportunities.
            - Other works as assigned from time to time.
        
        contributions:
          - Executed three research projects for TdH Netherlands, Chattogram City Corporation, and Ministry of Planning of GoB, contributing to methodology development, data collection, analysis, and reporting. 
          - Facilitated an eight-day training for 42 enumerators, supervised the month-long data collection and managed field logistics for the End-line Evaluation of BRAC’s Gender Responsive Education and Skill Programme in Chattogram Hill Tracts (a hard-to-reach hilly area). 
          - Authored two peer-reviewed journal articles and five op-eds in national newspapers, enhancing the organization's academic presence.
          - Reviewed 16 research articles and organized two national-level conferences, fostering academic discourse. 
          - Secured a $20,000 research grant from Bangladesh Police through a successful proposal for a study on public traffic awareness, collaborating with a co-researcher in proposal development. 

      - company: Change Initiative
        position: Research Assistant
        location: Dhaka, Bangladesh
        start_date: 2022
        end_date: 2023
        responsibilities: 
              - Identify possible research areas and assist in developing research proposals.
              - Develop research plans for conducting studies and collecting data on multiple streams such as the internet, legal documents, and other published research, etc.
              - Develop data collection tools (questionnaire, checklist, etc.), manage it in electronic form (Kobo toolbox, Survey CTO, etc.), and support data collection activities.
              - Conduct field visits and collect data from the field for the purpose of different studies.
              - Perform research objective-focused statistical and econometric analysis, and interpret their results.
              - Conduct economic analysis as a part of the feasibility study of various government projects.
              - Produce visual presentations of analyzed data and prepare presentations for sharing with the project management team.
              - Prepare research reports based on the primary and secondary data.
              - Assist in developing project proposals for raising funds from different donor organizations and coordinate with different stakeholders as per project need.
              - Prepare write-ups on different thematic issues and concept notes for events.
              - Provide support to organize press briefing and dissemination events.
              - Prepare policy briefing based on research findings.
        
        contributions:
          - Completed five research and consultancy projects for WIN, European Climate Foundation, ALRD, TI Maldives and Oxfam, assisting PI in design survey tools, data cleaning & analysis, policy analysis, and report writing.
          - Developed ODK forms for household data collection and managed databases for other projects.
          - Organized the Dhaka Renewable Energy and Finance Talk (DREFT), facilitating international discourse on renewable energy financing, with participation from over 300 stakeholders.
          - Secured a $15,000 consultancy from OXFAM Bangladesh through a competitive proposal process for a comprehensive study on climate risk insurance, supporting the PI in proposal development.

